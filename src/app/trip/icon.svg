  <!-- Shine overlay -->
  <circle cx="96" cy="96" r="88" fill="url(#shine)"/>

  <!-- Outer rim -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <circle cx="96" cy="96" r="90" fill="none" stroke="rgba(0,60,100,0.4)" stroke-width="3"/>
</svg>
