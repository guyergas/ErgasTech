<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="ocean" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4DB6E8"/>
      <stop offset="55%" stop-color="#1A8BC4"/>
      <stop offset="100%" stop-color="#0D5E8A"/>
    </radialGradient>
    <radialGradient id="shine" cx="32%" cy="28%" r="45%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="c"><circle cx="96" cy="96" r="88"/></clipPath>
  </defs>

  <!-- Ocean -->
  <circle cx="96" cy="96" r="88" fill="url(#ocean)"/>

  <!-- ── Landmasses (Asia-Pacific facing, like 🌏) ── -->
