    <path d="M 120 106 L 126 104 L 128 114 L 124 124 L 120 120 L 118 112 Z"
          fill="#6AAF3D"/>

    <!-- Indonesia / Sumatra -->
    <path d="M 112 122 L 128 118 L 140 120 L 146 126 L 138 130 L 124 130 L 112 128 Z"
          fill="#72B83E"/>

    <!-- Java -->
    <path d="M 130 132 L 148 130 L 156 132 L 154 136 L 138 136 L 128 136 Z"
          fill="#6AAF3D"/>

    <!-- Borneo -->
    <path d="M 144 112 L 158 110 L 166 116 L 164 128 L 154 132 L 144 128 L 140 120 Z"
          fill="#78BC40"/>

    <!-- Philippines -->
    <path d="M 154 92 L 158 88 L 162 92 L 160 100 L 156 100 Z"
          fill="#72B83E"/>
    <path d="M 160 98 L 164 96 L 166 102 L 162 104 L 158 102 Z"
          fill="#72B83E"/>

    <!-- Australia -->
    <path d="M 140 148 L 164 142 L 180 148 L 184 162 L 178 176 L 162 180 L 144 174 L 136 162 L 138 150 Z"
          fill="#C8A84B"/>

    <!-- New Zealand -->
    <path d="M 178 172 L 182 168 L 186 174 L 182 180 Z"
          fill="#72B83E"/>
    <path d="M 180 180 L 184 177 L 186 183 L 182 186 Z"
          fill="#72B83E"/>

    <!-- Middle East / Arabian Peninsula -->
    <path d="M 68 80 L 80 78 L 84 86 L 80 98 L 72 102 L 66 96 L 64 86 Z"
