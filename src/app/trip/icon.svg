<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="#3A5475"/>

  <!-- Globe circle -->
  <circle cx="96" cy="96" r="58" fill="none" stroke="#F2E8D4" stroke-width="3.5"/>

  <!-- Latitude lines -->
  <ellipse cx="96" cy="96" rx="58" ry="22" fill="none" stroke="#F2E8D4" stroke-width="1.8" opacity="0.55"/>
  <line x1="38" y1="96" x2="154" y2="96" stroke="#F2E8D4" stroke-width="1.8" opacity="0.55"/>
  <ellipse cx="96" cy="72" rx="46" ry="10" fill="none" stroke="#F2E8D4" stroke-width="1.4" opacity="0.4"/>
  <ellipse cx="96" cy="120" rx="46" ry="10" fill="none" stroke="#F2E8D4" stroke-width="1.4" opacity="0.4"/>

  <!-- Meridian lines -->
  <ellipse cx="96" cy="96" rx="22" ry="58" fill="none" stroke="#F2E8D4" stroke-width="1.8" opacity="0.55"/>
  <line x1="96" y1="38" x2="96" y2="154" stroke="#F2E8D4" stroke-width="1.8" opacity="0.55"/>

  <!-- Route path (Thailand journey) -->
  <path d="M 100 72 Q 105 82 103 90 Q 101 100 104 108 Q 108 120 100 132"
        fill="none" stroke="#C9954E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Start dot -->
  <circle cx="100" cy="72" r="4.5" fill="#C9954E"/>
  <!-- End dot -->
  <circle cx="100" cy="132" r="4.5" fill="#F2C994"/>

  <!-- ✦ glyph in top-left of globe area -->
  <text x="62" y="88" font-family="serif" font-size="14" fill="#F2E8D4" opacity="0.7">✦</text>
</svg>
