<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="ocean" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8BAFC4"/>
      <stop offset="60%" stop-color="#5E8FA8"/>
      <stop offset="100%" stop-color="#3A6B85"/>
    </radialGradient>
    <radialGradient id="land" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#E8D8A8"/>
      <stop offset="50%" stop-color="#C8B878"/>
      <stop offset="100%" stop-color="#A89448"/>
    </radialGradient>
    <radialGradient id="globe-shine" cx="35%" cy="28%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="bg-grad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#4A3520"/>
      <stop offset="100%" stop-color="#2A1E10"/>
    </radialGradient>
    <clipPath id="globe-clip">
      <circle cx="96" cy="96" r="72"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="#1a1005" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Dark wooden base background -->
  <rect width="192" height="192" rx="38" fill="url(#bg-grad)"/>
  <!-- Subtle wood grain lines -->
  <rect width="192" height="192" rx="38" fill="none" stroke="#6B4A20" stroke-width="0.5" opacity="0.4"/>

  <!-- Globe shadow -->
  <circle cx="99" cy="101" r="72" fill="rgba(0,0,0,0.35)" filter="url(#shadow)"/>

  <!-- Ocean base -->
  <circle cx="96" cy="96" r="72" fill="url(#ocean)"/>

  <!-- ── Continents (simplified but recognisable shapes) ── -->
  <g clip-path="url(#globe-clip)" fill="url(#land)" stroke="#8A7030" stroke-width="0.6" stroke-linejoin="round">

    <!-- Europe -->
    <path d="M 88 38 L 92 36 L 98 37 L 104 36 L 108 38 L 110 42 L 108 46 L 112 48 L 110 52 L 106 54 L 102 53 L 98 56 L 94 54 L 90 56 L 86 54 L 84 50 L 86 46 L 84 42 Z"/>

    <!-- Scandinavia -->
    <path d="M 96 28 L 100 26 L 104 28 L 106 32 L 104 36 L 100 37 L 96 35 Z"/>
    <path d="M 106 28 L 110 26 L 112 30 L 110 34 L 107 33 Z"/>

    <!-- Africa -->
    <path d="M 88 58 L 94 56 L 100 57 L 106 58 L 110 64 L 112 72 L 110 82 L 106 92 L 100 100 L 96 104 L 92 100 L 88 90 L 84 80 L 82 70 L 84 62 Z"/>

    <!-- Asia (large) -->
    <path d="M 110 36 L 120 34 L 132 36 L 140 40 L 148 42 L 154 48 L 156 54 L 150 58 L 142 60 L 136 58 L 128 62 L 120 64 L 114 62 L 110 56 L 108 50 L 110 44 Z"/>

    <!-- India -->
    <path d="M 128 62 L 132 64 L 134 70 L 132 78 L 128 82 L 124 78 L 122 70 L 124 64 Z"/>

    <!-- Southeast Asia (Thailand area) -->
    <path d="M 140 62 L 146 64 L 150 70 L 148 76 L 144 80 L 140 78 L 136 74 L 136 68 Z"/>
    <!-- Thailand peninsula -->
    <path d="M 144 80 L 146 86 L 144 92 L 142 88 L 142 82 Z"/>

    <!-- Japan -->
    <path d="M 154 48 L 158 46 L 160 50 L 158 54 L 155 52 Z"/>
    <path d="M 158 54 L 161 53 L 163 57 L 160 59 L 157 57 Z"/>

    <!-- North America -->
    <path d="M 38 36 L 46 32 L 56 32 L 66 34 L 74 38 L 78 44 L 76 52 L 70 58 L 62 62 L 54 60 L 46 56 L 40 50 L 36 44 Z"/>
    <!-- Alaska -->
    <path d="M 36 36 L 40 32 L 44 34 L 42 38 L 38 38 Z"/>
    <!-- Florida -->
    <path d="M 64 62 L 66 66 L 64 70 L 62 66 Z"/>
    <!-- Mexico -->
    <path d="M 44 62 L 52 62 L 56 68 L 54 74 L 50 76 L 46 72 L 42 66 Z"/>

    <!-- South America -->
    <path d="M 56 78 L 64 76 L 70 80 L 72 90 L 70 102 L 66 112 L 60 118 L 54 114 L 50 104 L 48 92 L 50 82 Z"/>

    <!-- Greenland -->
    <path d="M 76 20 L 84 18 L 90 22 L 88 28 L 82 30 L 76 28 Z"/>

    <!-- Australia -->
    <path d="M 144 100 L 154 98 L 162 102 L 164 110 L 160 118 L 152 120 L 144 116 L 140 108 L 142 102 Z"/>
    <!-- New Zealand -->
    <path d="M 166 118 L 168 114 L 170 118 L 168 122 Z"/>

    <!-- Antarctica hint -->
    <path d="M 52 148 L 80 146 L 110 146 L 138 148 L 152 152 L 150 158 L 120 160 L 90 160 L 60 158 L 48 154 Z" opacity="0.7"/>

    <!-- British Isles -->
    <path d="M 82 40 L 85 38 L 87 42 L 84 44 Z"/>
    <path d="M 79 42 L 81 40 L 82 44 L 80 46 Z"/>

    <!-- Madagascar -->
    <path d="M 112 86 L 114 84 L 116 88 L 114 94 L 112 90 Z"/>

    <!-- Iceland -->
    <path d="M 76 30 L 80 28 L 82 32 L 78 34 Z"/>
  </g>

  <!-- Latitude grid lines -->
  <g clip-path="url(#globe-clip)" fill="none" stroke="#2A4E68" stroke-width="0.5" opacity="0.45">
    <!-- Equator -->
    <ellipse cx="96" cy="96" rx="72" ry="8"/>
    <!-- Tropics -->
    <ellipse cx="96" cy="76" rx="70" ry="7"/>
    <ellipse cx="96" cy="116" rx="70" ry="7"/>
    <!-- Arctic/Antarctic circles -->
    <ellipse cx="96" cy="58" rx="58" ry="5"/>
    <ellipse cx="96" cy="134" rx="58" ry="5"/>
    <!-- Extra latitudes -->
    <ellipse cx="96" cy="40" rx="44" ry="4"/>
    <ellipse cx="96" cy="152" rx="44" ry="4"/>
  </g>

  <!-- Longitude grid lines -->
  <g clip-path="url(#globe-clip)" fill="none" stroke="#2A4E68" stroke-width="0.5" opacity="0.35">
    <ellipse cx="96" cy="96" rx="18" ry="72"/>
    <ellipse cx="96" cy="96" rx="36" ry="72"/>
    <ellipse cx="96" cy="96" rx="54" ry="72"/>
    <line x1="96" y1="24" x2="96" y2="168"/>
  </g>

  <!-- Tropic labels (tiny) -->
  <g clip-path="url(#globe-clip)" font-family="Georgia,serif" fill="#1A3A50" opacity="0.5" font-size="4.5">
    <text x="26" y="78">TROPIC OF CANCER</text>
    <text x="26" y="118">TROPIC OF CAPRICORN</text>
    <text x="52" y="98">EQUATOR</text>
  </g>

  <!-- Route marker for Thailand -->
  <g clip-path="url(#globe-clip)">
    <circle cx="144" cy="72" r="4" fill="#C0392B" stroke="#fff" stroke-width="1.2" opacity="0.9"/>
    <circle cx="144" cy="72" r="7" fill="none" stroke="#C0392B" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Glass shine overlay -->
  <circle cx="96" cy="96" r="72" fill="url(#globe-shine)"/>

  <!-- Globe rim -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="#D4A84B" stroke-width="1.8" opacity="0.7"/>
  <circle cx="96" cy="96" r="72" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>

  <!-- Brass meridian ring (vertical) -->
  <ellipse cx="96" cy="96" rx="76" ry="76" fill="none" stroke="#C8922A" stroke-width="5" opacity="0.0"/>
  <rect x="90" y="18" width="12" height="156" rx="6" fill="none" stroke="#C8922A" stroke-width="3.5" opacity="0.55" clip-path="url(#globe-clip)"/>

  <!-- Outer brass ring -->
  <circle cx="96" cy="96" r="79" fill="none" stroke="#C8922A" stroke-width="6" opacity="0.65"/>
  <circle cx="96" cy="96" r="82" fill="none" stroke="#8B6010" stroke-width="2" opacity="0.5"/>
  <circle cx="96" cy="96" r="76" fill="none" stroke="#E8C060" stroke-width="1" opacity="0.4"/>

  <!-- Degree marks on brass ring -->
  <g stroke="#C8922A" stroke-width="1.2" opacity="0.6">
    <line x1="96" y1="13" x2="96" y2="17"/>
    <line x1="96" y1="175" x2="96" y2="179"/>
    <line x1="13" y1="96" x2="17" y2="96"/>
    <line x1="175" y1="96" x2="179" y2="96"/>
    <line x1="37" y1="37" x2="40" y2="40"/>
    <line x1="152" y1="152" x2="155" y2="155"/>
    <line x1="152" y1="37" x2="155" y2="40"/>
    <line x1="37" y1="152" x2="40" y2="155"/>
  </g>
</svg>
