version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ergastech-app
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TRIP_ADMIN_EMAILS: ${TRIP_ADMIN_EMAILS}
      TRIP_AUTH_SECRET: ${TRIP_AUTH_SECRET}
      TRIP_DATA_DIR: /data/trip
    volumes:
      - ./public/ayala:/app/public/ayala
      - ./public/trip/uploads:/app/public/trip/uploads
      - ./data/trip:/data/trip
    restart: unless-stopped
    networks:
      - ergastech-network

networks:
  ergastech-network:
    driver: bridge
