<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#3A5475"/>

  <!-- Globe circle -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="#F2E8D4" stroke-width="8"/>

  <!-- Latitude lines -->
  <ellipse cx="256" cy="256" rx="155" ry="58" fill="none" stroke="#F2E8D4" stroke-width="4.5" opacity="0.55"/>
  <line x1="101" y1="256" x2="411" y2="256" stroke="#F2E8D4" stroke-width="4.5" opacity="0.55"/>
  <ellipse cx="256" cy="190" rx="124" ry="26" fill="none" stroke="#F2E8D4" stroke-width="3" opacity="0.4"/>
  <ellipse cx="256" cy="322" rx="124" ry="26" fill="none" stroke="#F2E8D4" stroke-width="3" opacity="0.4"/>

  <!-- Meridian lines -->
  <ellipse cx="256" cy="256" rx="58" ry="155" fill="none" stroke="#F2E8D4" stroke-width="4.5" opacity="0.55"/>
  <line x1="256" y1="101" x2="256" y2="411" stroke="#F2E8D4" stroke-width="4.5" opacity="0.55"/>

  <!-- Route path (Thailand journey) -->
  <path d="M 268 175 Q 282 205 278 230 Q 274 258 280 285 Q 288 318 268 352"
        fill="none" stroke="#C9954E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Start dot -->
  <circle cx="268" cy="175" r="12" fill="#C9954E"/>
  <!-- End dot -->
  <circle cx="268" cy="352" r="12" fill="#F2C994"/>

  <!-- ✦ glyph -->
  <text x="164" y="238" font-family="serif" font-size="38" fill="#F2E8D4" opacity="0.7">✦</text>
</svg>
